<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Kid Moments</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg-primary);
  }
  .auth-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .auth-card .logo { justify-content: center; margin-bottom: 32px; }
  .auth-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(230, 126, 34, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2rem;
  }
  .auth-card h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .auth-card p { color: var(--text-secondary); margin-bottom: 28px; line-height: 1.6; font-size: 0.95rem; }
  .form-group { margin-bottom: 20px; text-align: left; }
  .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; }
  .form-group input {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 1rem;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
  }
  .btn-full {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-full);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-full:hover { background: var(--accent-hover); transform: translateY(-2px); }
  .btn-full:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-links { margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary); }
  .auth-links a { color: var(--accent); font-weight: 700; text-decoration: none; }
  .auth-links a:hover { text-decoration: underline; }
  .error-msg { margin-top: 16px; font-weight: 600; color: #e74c3c; font-size: 0.9rem; }
  .debug-box {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: left;
    display: none;
    font-family: monospace;
    word-break: break-all;
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="logo">
      <span class="logo-icon">🌟</span>
      <span class="logo-text">Kid <span class="accent">Moments</span></span>
    </a>

    <div class="auth-icon">🔐</div>
    <h1>Admin Login</h1>
    <p>Sign in to manage chapters and upload songs.</p>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required value="emadh5156@gmail.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-full" id="loginBtn">🔓 Sign In</button>
      <p class="error-msg" id="loginError"></p>
    </form>

    <div class="debug-box" id="debugBox"></div>

    <div class="auth-links">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script>
// ===== HARDCODED CREDENTIALS — NO EXTERNAL DEPENDENCY =====
const ADMIN_EMAIL = 'emadh5156@gmail.com';
const ADMIN_PASS  = 'KidMoments2026';

// ===== THEME =====
(function() {
  var saved = localStorage.getItem('km_theme');
  var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
})();

// ===== AUTO-REDIRECT IF LOGGED IN =====
if (localStorage.getItem('km_admin')) {
  window.location.href = 'admin.html';
}

// ===== LOGIN =====
function doLogin(e) {
  e.preventDefault();

  var btn   = document.getElementById('loginBtn');
  var error = document.getElementById('loginError');
  var debug = document.getElementById('debugBox');

  var email = document.getElementById('email').value;
  var pass  = document.getElementById('password').value;

  // Trim
  email = (email || '').trim();
  pass  = (pass || '').trim();

  // Debug info
  debug.style.display = 'block';
  debug.innerHTML =
    '📧 Input email: "' + email + '"<br>' +
    '📧 Expected:    "' + ADMIN_EMAIL + '"<br>' +
    '📧 Match: ' + (email === ADMIN_EMAIL) + '<br>' +
    '🔑 Input pass length: ' + pass.length + '<br>' +
    '🔑 Expected length:   ' + ADMIN_PASS.length + '<br>' +
    '🔑 Match: ' + (pass === ADMIN_PASS);

  error.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Checking...';

  setTimeout(function() {
    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
      // SUCCESS
      localStorage.setItem('km_admin', JSON.stringify({ email: email, ts: Date.now() }));
      error.textContent = '';
      error.style.color = '#27ae60';
      error.textContent = '✅ Login successful! Redirecting...';
      setTimeout(function() {
        window.location.href = 'admin.html';
      }, 500);
    } else {
      // FAIL
      error.style.color = '#e74c3c';
      error.textContent = '❌ Invalid email or password';
      btn.disabled = false;
      btn.textContent = '🔓 Sign In';
    }
  }, 300);
}
</script>

</body>
</html>
